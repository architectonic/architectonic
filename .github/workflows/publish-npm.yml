name: Publish npm

on:
  push:
    branches: [main]
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
    paths:
      - package.json
      - README.md
      - CHANGELOG.md
      - bin/**
      - lib/**
      - docs/**
      - protocol/**
      - scripts/**
      - test/**
      - .github/workflows/publish-npm.yml
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  statuses: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate source
        run: |
          npm test
          npm run check
          npm run pack:verify
      - name: Tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER="$(node -p "require('./package.json').version")"
          test "$VER" = "$TAG" || { echo "version mismatch: package.json is $VER but tag is v$TAG"; exit 1; }
      - name: Build exact package artifact
        id: pack
        run: |
          npm pack --json > pack.json
          FILE="$(node -e "const x=require('./pack.json'); process.stdout.write(x[0].filename)")"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
      - name: Preserve exact release artifact
        uses: actions/upload-artifact@v4
        with:
          name: architectonic-npm-package
          path: ${{ steps.pack.outputs.file }}
          if-no-files-found: error
          retention-days: 14
      - name: Validate packed artifact
        run: |
          mkdir unpacked
          tar -xzf "${{ steps.pack.outputs.file }}" -C unpacked
          node unpacked/package/bin/architectonic.js --self-check
      - name: Install current npm CLI
        run: npm install -g npm@latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Check registry version
        id: registry
        run: |
          PKG="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          CURRENT="$(npm view "$PKG" version 2>/dev/null || true)"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          test "$CURRENT" = "$VER" && echo "published=true" >> "$GITHUB_OUTPUT" || echo "published=false" >> "$GITHUB_OUTPUT"
      - name: Publish
        if: steps.registry.outputs.published != 'true'
        run: npm publish "${{ steps.pack.outputs.file }}" --access public
      - name: Verify registry
        run: |
          for i in $(seq 1 12); do
            CURRENT="$(npm view "${{ steps.registry.outputs.package }}" version 2>/dev/null || true)"
            test "$CURRENT" = "${{ steps.registry.outputs.version }}" && exit 0
            sleep 5
          done
          echo "registry did not return ${{ steps.registry.outputs.package }}@${{ steps.registry.outputs.version }}"
          exit 1
      - name: Verify adaptive consumer workflows from npm
        env:
          VERSION: ${{ steps.registry.outputs.version }}
          NO_COLOR: '1'
        run: |
          ROOT="$(mktemp -d)"
          cd "$ROOT"
          npx --yes "architectonic@$VERSION" --version
          npx --yes "architectonic@$VERSION" --self-check

          npx --yes "architectonic@$VERSION" recommend --need "one-off throwaway script" --json > one-off.json
          node -e 'const x=require("./one-off.json"); if (x.install !== false) { console.error(x); process.exit(1); }'
          npx --yes "architectonic@$VERSION" recommend --need "changing regulatory corpus" --json > living.json
          node -e 'const x=require("./living.json"); if (x.profile !== "living-knowledge-system") { console.error(x); process.exit(1); }'

          npx --yes "architectonic@$VERSION" init standalone-project --preset project --source npm
          npx --yes "architectonic@$VERSION" verify --dir standalone-project --json > project-verify.json
          node -e 'const x=require("./project-verify.json"); if (!x.ok || x.results.length !== 1 || x.results[0].layer !== "project") { console.error(x); process.exit(1); }'

          npx --yes "architectonic@$VERSION" init wiki --preset llm-wiki --source npm
          npx --yes "architectonic@$VERSION" verify --dir wiki --json > wiki-verify.json
          node -e 'const x=require("./wiki-verify.json"); if (!x.ok || !x.features.includes("wiki")) { console.error(x); process.exit(1); }'
          npx --yes "architectonic@$VERSION" graph --dir wiki --format both --json > graph.json
          node -e 'const x=require("./graph.json"); if (x.canonical !== false || !Array.isArray(x.files) || x.files.length !== 2) { console.error(x); process.exit(1); }'
          test -f wiki/organization/knowledge/wiki/index.md
          test -f wiki/organization/knowledge/.archive/README.md
          test -f wiki/.architectonic/derived/graph.json
          test -f wiki/skills/core/skills/adaptive-composition.md
          test -f wiki/skills/core/skills/knowledge-lifecycle-design.md
          test -f wiki/skills/core/skills/loop-engineering.md
          test -f wiki/skills/core/skills/graph-projection.md
          test -f wiki/skills/core/skills/public-skill-adoption.md

          npx --yes "architectonic@$VERSION" init full --preset full --source npm
          npx --yes "architectonic@$VERSION" onboard --dir full --json > full-onboard.json
          node -e 'const x=require("./full-onboard.json"), expected=Object.keys(require("./full/architectonic.json").layers).length; if (!x.ok || x.rows.length !== expected) { console.error({expected, result:x}); process.exit(1); }'
          npx --yes "architectonic@$VERSION" verify --dir full --json > full-verify.json
          node -e 'const x=require("./full-verify.json"), expected=Object.keys(require("./full/architectonic.json").layers).length; if (!x.ok || x.results.length !== expected) { console.error({expected, result:x}); process.exit(1); }'
      - name: Report release success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: success
          CONTEXT: npm-release
          DESCRIPTION: architectonic@${{ steps.registry.outputs.version }} published and adaptive workflows tested
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.CONTEXT,description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))')"
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "$PAYLOAD"
      - name: Report release failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: failure
          CONTEXT: npm-release
          DESCRIPTION: npm release or adaptive consumer workflow failed
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.CONTEXT,description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))')"
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "$PAYLOAD"
